<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cart — CRG Cards</title>
<meta property="og:title" content="CRG Cards — Rips &amp; Grails"/>
<meta property="og:description" content="Pokemon, Sports, and Grail cards. Shop pack rips, rare singles, and mystery boxes."/>
<meta property="og:image" content="https://cards-rg.onrender.com/images/preview.png"/>
<meta property="og:url" content="https://cards-rg.onrender.com"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://cards-rg.onrender.com/images/preview.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:rgba(255,255,255,.08);--pink:#f0217c;--teal:#4EC9F0;--red:#ef4444;--green:#22c55e;--white:#ffffff;--muted:#6b7280;--sans:'Inter','Segoe UI',sans-serif;--radius:6px;--shadow:0 4px 24px rgba(0,0,0,.5);--grad:linear-gradient(135deg,var(--pink),var(--teal))}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--white);min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:sticky;top:0;z-index:500;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;gap:1.5rem}
.nav-logo img{height:56px;width:auto;display:block}
nav{height:70px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:.45rem .9rem;border-radius:var(--radius);font-size:.85rem;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--white);transition:.15s;font-family:var(--sans)}
.nav-btn:hover{background:var(--bg3);border-color:rgba(255,255,255,.18)}
.sec{padding:3rem 2rem;max-width:1100px;margin:0 auto}
.page-title{font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.25rem}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:2rem}
.cart-layout{display:grid;grid-template-columns:1fr 340px;gap:1.75rem;align-items:start}
.cart-items{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cart-item{display:flex;gap:1.1rem;padding:1.25rem 1.4rem;border-bottom:1px solid var(--border);align-items:flex-start;transition:background .15s}
.cart-item:last-child{border-bottom:none}
.cart-item:hover{background:var(--bg3)}
.item-img{width:80px;height:80px;border-radius:var(--radius);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-weight:700;font-size:.93rem;margin-bottom:.25rem}
.item-meta{font-size:.78rem;color:var(--muted);margin-bottom:.75rem}
.qty-row{display:flex;align-items:center;gap:.6rem}
.qty-btn{width:28px;height:28px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);color:var(--white);cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:.15s}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-num{font-weight:700;font-size:.93rem;min-width:24px;text-align:center}
.item-price{text-align:right;flex-shrink:0}
.item-subtotal{font-size:1.05rem;font-weight:800;margin-bottom:.5rem;letter-spacing:-.01em}
.remove-btn{font-size:.73rem;color:var(--muted);cursor:pointer;transition:.15s;background:none;border:none;font-family:var(--sans)}
.remove-btn:hover{color:var(--red)}
.summary{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;position:sticky;top:80px}
.summary h3{font-size:1rem;font-weight:800;letter-spacing:-.01em;margin-bottom:1.25rem;padding-bottom:.85rem;border-bottom:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.65rem;color:var(--muted)}
.sum-row.total{font-weight:800;font-size:1.1rem;color:var(--white);padding-top:.75rem;border-top:1px solid var(--border);margin-top:.75rem;letter-spacing:-.01em}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:.85rem 1.5rem;border-radius:var(--radius);font-weight:700;font-size:.92rem;cursor:pointer;border:none;transition:.2s;font-family:var(--sans);width:100%;margin-top:1rem}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(232,121,249,.2)}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border);margin-top:.6rem}
.btn-outline:hover{background:var(--bg3)}
.empty{text-align:center;padding:5rem 1rem}
.empty .ico{font-size:2.5rem;margin-bottom:.85rem}
.empty h3{font-size:1.4rem;font-weight:800;margin-bottom:.5rem;letter-spacing:-.02em}
.empty p{color:var(--muted);margin-bottom:1.75rem;font-size:.9rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1.2rem;font-size:.85rem;font-weight:600;z-index:1000;transform:translateY(16px);opacity:0;transition:.25s;box-shadow:var(--shadow)}
.toast.show{transform:translateY(0);opacity:1}
.trust-badge{display:flex;align-items:center;gap:.6rem;font-size:.76rem;color:var(--muted);margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
@media(max-width:800px){.cart-layout{grid-template-columns:1fr}.summary{position:static}}
@media(max-width:480px){.sec{padding:2rem 1rem}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="CRG Cards" style="height:56px"/></a>
  <div style="display:flex;gap:.5rem">
    <a href="/" class="nav-btn">← Continue Shopping</a>
  </div>
</nav>

<div class="sec">
  <div class="page-title">Shopping Cart</div>
  <div class="page-sub" id="cartSub">Loading…</div>

  <div id="emptyState" class="empty" style="display:none">
    <div class="ico">🛒</div>
    <h3>Your cart is empty</h3>
    <p>Looks like you haven't added anything yet.</p>
    <a href="/" class="btn btn-primary" style="display:inline-flex;width:auto;padding:.8rem 2rem">Browse Products</a>
  </div>

  <div id="loadingState" class="loading">Loading cart…</div>

  <div id="cartLayout" class="cart-layout" style="display:none">
    <div>
      <div class="cart-items" id="cartItems"></div>
    </div>
    <div class="summary">
      <h3>Order Summary</h3>
      <div class="sum-row"><span>Subtotal</span><span id="sumSubtotal">—</span></div>
      <div class="sum-row" id="shippingRow"><span>Shipping</span><span id="sumShipping">Free</span></div>
      <div class="sum-row" id="taxRow" style="display:none"><span>Tax</span><span id="sumTax">—</span></div>
      <div class="sum-row total"><span>Total</span><span id="sumTotal">—</span></div>
      <button class="btn btn-primary" id="checkoutBtn" onclick="checkout()">🔒 Checkout</button>
      <a href="/" class="btn btn-outline">← Keep Shopping</a>
      <div class="trust-badge">🔒 Secure checkout &nbsp;·&nbsp; 🚚 Fast delivery</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
async function loadCart() {
  const res  = await fetch('/api/cart');
  const data = await res.json();
  document.getElementById('loadingState').style.display = 'none';
  if (!data.items || data.items.length === 0) {
    document.getElementById('emptyState').style.display  = 'block';
    document.getElementById('cartLayout').style.display  = 'none';
    document.getElementById('cartSub').textContent = '0 items';
    return;
  }
  document.getElementById('cartSub').textContent = `${data.item_count} item${data.item_count!==1?'s':''}`;
  document.getElementById('cartLayout').style.display = 'grid';
  document.getElementById('cartItems').innerHTML = data.items.map(item => `
    <div class="cart-item" id="item-${item.product_id}">
      <div class="item-img">${item.image_url ? `<img src="${item.image_url}" alt="${item.name}"/>` : '📦'}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.price_formatted} each</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="updateQty(${item.product_id}, ${item.quantity - 1})">−</button>
          <span class="qty-num" id="qty-${item.product_id}">${item.quantity}</span>
          <button class="qty-btn" onclick="updateQty(${item.product_id}, ${item.quantity + 1})">+</button>
        </div>
      </div>
      <div class="item-price">
        <div class="item-subtotal">${item.subtotal_formatted}</div>
        <button class="remove-btn" onclick="removeItem(${item.product_id})">Remove</button>
      </div>
    </div>
  `).join('');
  document.getElementById('sumSubtotal').textContent = data.subtotal_formatted;
  document.getElementById('sumShipping').textContent = data.shipping > 0 ? data.shipping_formatted : 'Free';
  document.getElementById('sumTotal').textContent    = data.total_formatted;
  if (data.tax > 0) {
    document.getElementById('taxRow').style.display = 'flex';
    document.getElementById('sumTax').textContent   = data.tax_formatted;
  }
}

async function updateQty(product_id, quantity) {
  const res  = await fetch('/api/cart/update', { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({product_id, quantity}) });
  const data = await res.json();
  if (!res.ok) { toast(data.error||'Error'); return; }
  if (quantity <= 0) { document.getElementById(`item-${product_id}`)?.remove(); }
  else { document.getElementById(`qty-${product_id}`).textContent = quantity; }
  document.getElementById('sumSubtotal').textContent = data.subtotal_formatted || '—';
  document.getElementById('sumTotal').textContent    = data.total_formatted    || '—';
  const cnt = data.item_count;
  document.getElementById('cartSub').textContent = `${cnt} item${cnt!==1?'s':''}`;
  if (!cnt) loadCart();
}

async function removeItem(product_id) {
  await fetch(`/api/cart/remove/${product_id}`, { method:'DELETE' });
  loadCart(); toast('Item removed');
}

async function checkout() {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true; btn.textContent = 'Redirecting…';
  try {
    const res  = await fetch('/api/checkout/session', { method:'POST', headers:{'Content-Type':'application/json'} });
    const data = await res.json();
    if (!res.ok) { toast(data.error||'Checkout unavailable'); btn.disabled=false; btn.textContent='🔒 Checkout'; return; }
    window.location.href = data.url;
  } catch(e) { toast('Network error'); btn.disabled=false; btn.textContent='🔒 Checkout'; }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
loadCart();
</script>
</body>
</html>
