<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Orders — CRG Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:rgba(255,255,255,.08);--pink:#f0217c;--teal:#4EC9F0;--red:#ef4444;--green:#22c55e;--gold:#f59e0b;--white:#ffffff;--muted:#6b7280;--sans:'Inter','Segoe UI',sans-serif;--radius:6px;--shadow:0 4px 24px rgba(0,0,0,.5);--grad:linear-gradient(135deg,var(--pink),var(--teal))}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--white);min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:sticky;top:0;z-index:500;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;gap:1.5rem}
.nav-logo img{height:56px;width:auto;display:block}
nav{height:70px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:.45rem .9rem;border-radius:var(--radius);font-size:.85rem;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--white);transition:.15s;font-family:var(--sans)}
.nav-btn:hover{background:var(--bg3);border-color:rgba(255,255,255,.18)}
.nav-cart{background:var(--grad);border-color:transparent!important;color:#fff}
.nav-cart:hover{opacity:.9}
.sec{padding:3rem 2rem;max-width:900px;margin:0 auto}
.page-title{font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.25rem}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:.75rem}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;overflow:hidden;transition:border-color .15s}
.order-card:hover{border-color:rgba(255,255,255,.14)}
.order-head{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;gap:1rem;flex-wrap:wrap;cursor:pointer}
.order-head:hover{background:var(--bg3)}
.order-meta{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap}
.order-id{font-size:.8rem;font-weight:700;letter-spacing:.05em;color:var(--muted)}
.order-date{font-size:.82rem;color:var(--muted)}
.order-total{font-size:1rem;font-weight:800;letter-spacing:-.01em}
.status-badge{padding:.25rem .7rem;border-radius:2px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.status-pending{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3)}
.status-processing{background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.status-shipped{background:rgba(232,121,249,.15);color:var(--accent);border:1px solid rgba(232,121,249,.3)}
.status-delivered{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.status-cancelled{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.order-expand{font-size:1rem;color:var(--muted);transition:.2s}
.order-body{padding:0 1.4rem 1.25rem;border-top:1px solid var(--border)}
.order-item{display:flex;gap:1rem;padding:.85rem 0;border-bottom:1px solid var(--border);align-items:center}
.order-item:last-child{border-bottom:none}
.order-item-img{width:50px;height:50px;border-radius:var(--radius);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden}
.order-item-img img{width:100%;height:100%;object-fit:cover}
.order-item-name{font-size:.88rem;font-weight:600;flex:1}
.order-item-qty{font-size:.78rem;color:var(--muted);margin-top:.2rem}
.order-item-price{font-size:.9rem;font-weight:700}
.search-bar{display:flex;gap:.75rem;margin-bottom:1.75rem}
.search-bar input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1rem;color:var(--white);font-family:var(--sans);font-size:.88rem;outline:none;transition:.15s}
.search-bar input:focus{border-color:rgba(255,255,255,.2)}
.search-bar input::placeholder{color:var(--muted)}
.search-bar button{background:var(--grad);color:#fff;border:none;border-radius:var(--radius);padding:.6rem 1.25rem;font-size:.85rem;font-weight:700;cursor:pointer;font-family:var(--sans)}
.empty{text-align:center;padding:5rem 1rem;color:var(--muted)}
.empty .ico{font-size:2.5rem;margin-bottom:.85rem}
.empty h3{font-size:1.2rem;font-weight:800;color:var(--white);margin-bottom:.4rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
@media(max-width:640px){.sec{padding:2rem 1rem}.order-meta{gap:.75rem}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="CRG Cards"/></a>
  <div style="display:flex;gap:.5rem">
    <a href="/" class="nav-btn">← Shop</a>
    <a href="/cart.html" class="nav-btn nav-cart">🛒 Cart</a>
  </div>
</nav>

<div class="sec">
  <div class="page-title">Your Orders</div>
  <div class="page-sub">Track and manage your CRG Cards purchases</div>

  <div class="search-bar">
    <input type="text" id="orderSearch" placeholder="Search by order ID or product name…" oninput="filterOrders(this.value)"/>
    <button onclick="loadOrders()">Refresh</button>
  </div>

  <div id="loadingState" class="loading">Loading orders…</div>
  <div id="ordersContainer"></div>
  <div id="emptyState" class="empty" style="display:none">
    <div class="ico">📦</div>
    <h3>No orders yet</h3>
    <p>Your orders will appear here after you make a purchase.</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:6px;background:var(--grad);color:#fff;padding:.75rem 1.5rem;border-radius:var(--radius);font-weight:700;font-size:.88rem;margin-top:1.25rem">Start Shopping →</a>
  </div>
</div>

<script>
let allOrders = [];

async function loadOrders() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('ordersContainer').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  try {
    const res = await fetch('/api/orders');
    const { orders } = await res.json();
    allOrders = orders || [];
    document.getElementById('loadingState').style.display = 'none';
    renderOrders(allOrders);
  } catch(e) {
    document.getElementById('loadingState').textContent = 'Failed to load orders.';
  }
}

function renderOrders(orders) {
  if (!orders.length) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('ordersContainer').innerHTML = '';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('ordersContainer').innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-head" onclick="toggleOrder(${o.id})">
        <div class="order-meta">
          <span class="order-id">ORDER #${o.id}</span>
          <span class="order-date">${new Date(o.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
          <span class="status-badge status-${(o.status||'pending').toLowerCase()}">${o.status||'Pending'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:1rem">
          <span class="order-total">${o.total_formatted || '$'+Number(o.total/100).toFixed(2)}</span>
          <span class="order-expand" id="expand-${o.id}">▾</span>
        </div>
      </div>
      <div class="order-body" id="body-${o.id}" style="display:none">
        ${(o.items||[]).map(item => `
          <div class="order-item">
            <div class="order-item-img">${item.image_url ? `<img src="${item.image_url}" alt="${item.name}"/>` : '📦'}</div>
            <div class="order-item-name">${item.name}<div class="order-item-qty">Qty: ${item.quantity}</div></div>
            <div class="order-item-price">${item.subtotal_formatted || ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleOrder(id) {
  const body = document.getElementById(`body-${id}`);
  const arrow = document.getElementById(`expand-${id}`);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.textContent = open ? '▾' : '▴';
}

function filterOrders(val) {
  if (!val.trim()) { renderOrders(allOrders); return; }
  const q = val.toLowerCase();
  renderOrders(allOrders.filter(o =>
    String(o.id).includes(q) ||
    (o.items||[]).some(i => i.name.toLowerCase().includes(q))
  ));
}

loadOrders();
</script>
</body>
</html>
