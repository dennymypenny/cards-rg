<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Order Confirmed — CRG Cards</title>
<meta property="og:title" content="CRG Cards — Rips &amp; Grails"/>
<meta property="og:description" content="Pokemon, Sports, and Grail cards. Shop pack rips, rare singles, and mystery boxes."/>
<meta property="og:image" content="https://cards-rg.onrender.com/images/preview.png"/>
<meta property="og:url" content="https://cards-rg.onrender.com"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:image" content="https://cards-rg.onrender.com/images/preview.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--border:rgba(255,255,255,.08);--pink:#f0217c;--teal:#4EC9F0;--green:#22c55e;--white:#ffffff;--muted:#6b7280;--sans:'Inter','Segoe UI',sans-serif;--radius:6px;--grad:linear-gradient(135deg,var(--pink),var(--teal))}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
nav{background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;padding:0 2rem}
.nav-logo img{height:42px;width:auto;display:block}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}
.success-box{max-width:560px;width:100%;text-align:center}
.check-ring{width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.75rem;font-size:2rem}
.success-box h1{font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.5rem}
.success-box .sub{font-size:.95rem;color:var(--muted);line-height:1.7;margin-bottom:2rem}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;text-align:left;margin-bottom:2rem}
.order-card h3{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.detail-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.6rem;color:var(--muted)}
.detail-row strong{color:var(--white);font-weight:600}
.detail-row:last-child{margin-bottom:0;padding-top:.6rem;border-top:1px solid var(--border);font-weight:800;font-size:.95rem;color:var(--white)}
.detail-row:last-child strong{font-size:1rem}
.btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.8rem 1.75rem;border-radius:var(--radius);font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:.2s;font-family:var(--sans)}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg3)}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;overflow:hidden}
.dot{position:absolute;width:8px;height:8px;border-radius:50%;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="CRG Cards"/></a>
</nav>

<div class="confetti" id="confetti"></div>

<div class="main">
  <div class="success-box">
    <div class="check-ring">✓</div>
    <h1>Order Confirmed!</h1>
    <p class="sub">Thanks for shopping at CRG Cards. Your order is being processed and you'll receive a confirmation shortly.</p>

    <div class="order-card" id="orderSummary" style="display:none">
      <h3>Order Details</h3>
      <div class="detail-row"><span>Order ID</span><strong id="orderId">—</strong></div>
      <div class="detail-row"><span>Items</span><strong id="orderItems">—</strong></div>
      <div class="detail-row"><span>Status</span><strong style="color:#22c55e">Processing</strong></div>
      <div class="detail-row"><span>Total</span><strong id="orderTotal">—</strong></div>
    </div>

    <div class="btns">
      <a href="/orders.html" class="btn btn-primary">View My Orders</a>
      <a href="/" class="btn btn-outline">Continue Shopping</a>
    </div>
  </div>
</div>

<script>
// Show confetti
const colors = ['#f0217c','#4EC9F0','#f9a8d4','#00e5ff','#ffffff'];
const c = document.getElementById('confetti');
for (let i = 0; i < 60; i++) {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.left = Math.random()*100 + '%';
  dot.style.background = colors[Math.floor(Math.random()*colors.length)];
  dot.style.animationDuration = (2 + Math.random()*3) + 's';
  dot.style.animationDelay = Math.random()*2 + 's';
  dot.style.width = dot.style.height = (5 + Math.random()*8) + 'px';
  c.appendChild(dot);
}

// Try to load order info from URL params
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');
if (sessionId) {
  fetch(`/api/orders/by-session/${sessionId}`)
    .then(r => r.json())
    .then(data => {
      if (data.order) {
        document.getElementById('orderId').textContent = '#' + data.order.id;
        document.getElementById('orderItems').textContent = data.order.item_count + ' item(s)';
        document.getElementById('orderTotal').textContent = data.order.total_formatted;
        document.getElementById('orderSummary').style.display = 'block';
      }
    })
    .catch(()=>{});
}
</script>
</body>
</html>
