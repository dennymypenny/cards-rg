<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Order Confirmed &#8212; CRG Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bevan&family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;
  --border:#2a2a2a;--border2:#333;
  --teal:#14B8A6;--teal2:#0f9184;--teal-glow:rgba(20,184,166,.25);
  --pink:#FF2D7A;--pink2:#e0205f;--pink-glow:rgba(255,45,122,.2);
  --silver:#D1D1D1;--silver2:#a0a0a0;
  --text:#ffffff;--text2:#D1D1D1;--muted:#777;
  --sans:'Inter','Segoe UI',sans-serif;
  --display:'Bevan',serif;
  --radius:14px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
a{text-decoration:none;color:inherit}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;max-width:560px;width:100%;padding:2.75rem 2.5rem;box-shadow:0 8px 60px rgba(0,0,0,.7),0 0 80px rgba(20,184,166,.05)}

.check{width:76px;height:76px;border-radius:50%;background:rgba(20,184,166,.12);border:2px solid rgba(20,184,166,.4);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1.5rem;box-shadow:0 0 30px var(--teal-glow)}

.title{font-family:var(--display);font-size:1.9rem;text-align:center;margin-bottom:.4rem;letter-spacing:.04em}
.title .t{color:var(--teal)}
.title .p{color:var(--pink)}

.sub{color:var(--silver2);text-align:center;font-size:.9rem;margin-bottom:2rem;line-height:1.65}
.sub strong{color:var(--text)}

.order-num{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:1rem 1.25rem;text-align:center;margin-bottom:1.5rem}
.order-num label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;display:block;margin-bottom:.3rem}
.order-num strong{display:block;font-size:1.2rem;font-weight:800;color:var(--teal);letter-spacing:-.01em}

.items-list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);font-size:.85rem}
.item-row:last-child{border-bottom:none}
.item-row .n{font-weight:600;color:var(--text)}
.item-row .q{color:var(--muted);font-size:.78rem;margin-top:.15rem}
.item-row .p{font-weight:800;color:var(--text)}

.totals{background:var(--bg3);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem}
.tot-row{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:.5rem}
.tot-row:last-child{margin-bottom:0;font-weight:800;font-size:1rem;color:var(--text);padding-top:.5rem;border-top:1px solid var(--border2);margin-top:.5rem}
.tot-row:last-child span:last-child{color:var(--pink)}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:.85rem;border-radius:var(--radius);font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:.2s;font-family:var(--sans);text-decoration:none;margin-bottom:.6rem}
.btn-teal{background:var(--teal);color:#000;box-shadow:0 4px 20px var(--teal-glow)}
.btn-teal:hover{background:var(--teal2);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}
.btn-outline:hover{background:var(--bg3)}

.loading{text-align:center;color:var(--muted);padding:2rem}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Loading your order&#8230;</div>
</div>

<script>
async function load() {
  const params     = new URLSearchParams(location.search);
  const session_id = params.get('session_id');
  if (!session_id) { renderError('No order session found.'); return; }
  await fetch('/api/cart/clear', { method:'DELETE' }).catch(()=>{});
  try {
    const res  = await fetch(`/api/checkout/order?session_id=${session_id}`);
    const data = await res.json();
    if (!res.ok) { renderError(data.error || 'Order not found'); return; }
    renderOrder(data.order);
  } catch(e) {
    renderError('Unable to load order details.');
  }
}

function renderOrder(order) {
  document.getElementById('card').innerHTML = `
    <div class="check">&#9989;</div>
    <div class="title"><span class="t">ORDER</span> <span class="p">CONFIRMED!</span></div>
    <p class="sub">
      The rip is locked in, <strong>${order.customer_name}</strong>!<br>
      Confirmation sent to <strong>${order.customer_email}</strong>.
    </p>
    <div class="order-num">
      <label>Order Number</label>
      <strong>${order.order_number}</strong>
    </div>
    ${order.items && order.items.length ? `
    <div class="items-list">
      ${order.items.map(i => `
        <div class="item-row">
          <div>
            <div class="n">${esc(i.name)}</div>
            <div class="q">Qty: ${i.quantity}</div>
          </div>
          <div class="p">$${(i.subtotal/100).toFixed(2)}</div>
        </div>`).join('')}
    </div>` : ''}
    <div class="totals">
      ${order.shipping > 0 ? `<div class="tot-row"><span>Shipping</span><span>${order.shipping_formatted}</span></div>` : `<div class="tot-row"><span>Shipping</span><span style="color:var(--teal)">Free</span></div>`}
      ${order.tax > 0 ? `<div class="tot-row"><span>Tax</span><span>${order.tax_formatted}</span></div>` : ''}
      <div class="tot-row"><span>Total Charged</span><span>${order.total_formatted}</span></div>
    </div>
    <a href="/" class="btn btn-teal">&#9889; Continue Shopping</a>
    <a href="/orders.html" class="btn btn-outline">&#128203; Track Your Order</a>
  `;
}

function renderError(msg) {
  document.getElementById('card').innerHTML = `
    <div style="text-align:center;padding:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:1rem">&#9888;&#65039;</div>
      <div style="font-family:var(--display);font-size:1.4rem;margin-bottom:.5rem;color:var(--text);letter-spacing:.04em">SOMETHING WENT WRONG</div>
      <div style="color:var(--muted);margin-bottom:1.5rem">${msg}</div>
      <a href="/" class="btn btn-teal" style="display:flex">&#8592; Back to Store</a>
    </div>
  `;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

load();
</script>
</body>
</html>
